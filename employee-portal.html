<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>WIOM IT Helpdesk — Employee Portal</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Segoe UI',Arial,sans-serif; background:#0f172a; color:#e2e8f0; min-height:100vh; }

/* ── Login ── */
#loginPage { display:flex; justify-content:center; align-items:center; min-height:100vh; background:linear-gradient(135deg,#0f172a,#1e293b); padding:20px; }
.login-box { background:#1e293b; padding:36px; border-radius:16px; width:100%; max-width:380px; border:1px solid #334155; box-shadow:0 20px 60px rgba(0,0,0,.5); }
.login-box h1 { font-size:20px; margin-bottom:4px; color:#f1f5f9; }
.login-box p  { font-size:13px; color:#94a3b8; margin-bottom:24px; }
.logo { text-align:center; margin-bottom:20px; font-size:44px; }
input { width:100%; padding:12px 14px; background:#0f172a; border:1px solid #334155; border-radius:8px; color:#f1f5f9; font-size:14px; margin-bottom:12px; outline:none; transition:border .2s; }
input:focus { border-color:#6366f1; }
.btn-primary { width:100%; padding:13px; background:linear-gradient(135deg,#6366f1,#8b5cf6); border:none; border-radius:8px; color:#fff; font-size:15px; font-weight:600; cursor:pointer; }
.btn-primary:hover { opacity:.9; }
.err { color:#f87171; font-size:13px; margin-top:8px; text-align:center; display:none; }

/* ── Main ── */
#mainPage { display:none; max-width:800px; margin:0 auto; padding:20px; }
.topbar { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; padding:14px 20px; background:#1e293b; border-radius:12px; border:1px solid #334155; }
.topbar-left h2 { font-size:15px; color:#f1f5f9; font-weight:700; }
.topbar-left p  { font-size:12px; color:#64748b; margin-top:2px; }
.logout-btn { background:transparent; border:1px solid #334155; color:#94a3b8; padding:6px 12px; border-radius:8px; cursor:pointer; font-size:12px; }

/* ── Tabs ── */
.tabs { display:flex; gap:4px; margin-bottom:20px; background:#1e293b; padding:6px; border-radius:12px; border:1px solid #334155; }
.tab-btn { flex:1; padding:10px; border:none; border-radius:8px; background:transparent; color:#94a3b8; font-size:13px; cursor:pointer; font-weight:500; transition:all .2s; }
.tab-btn.active { background:#6366f1; color:#fff; }

/* ── Chat ── */
.chat-wrap { background:#1e293b; border:1px solid #334155; border-radius:12px; overflow:hidden; }
.chat-messages { height:420px; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:12px; }
.msg { max-width:85%; padding:12px 16px; border-radius:12px; font-size:14px; line-height:1.5; }
.msg.bot { background:#0f172a; color:#e2e8f0; border-radius:4px 12px 12px 12px; align-self:flex-start; border:1px solid #334155; }
.msg.user { background:linear-gradient(135deg,#6366f1,#8b5cf6); color:#fff; border-radius:12px 4px 12px 12px; align-self:flex-end; }
.msg.system { background:#1a2744; color:#93c5fd; font-size:12px; text-align:center; align-self:center; padding:6px 14px; border-radius:20px; }
.msg pre { white-space:pre-wrap; font-family:inherit; }
.ticket-created { background:#14532d; border:1px solid #166534; border-radius:8px; padding:12px; margin-top:8px; font-size:13px; }
.chat-input-wrap { display:flex; gap:8px; padding:12px; border-top:1px solid #334155; background:#0f172a; }
.chat-input { flex:1; padding:11px 14px; background:#1e293b; border:1px solid #334155; border-radius:8px; color:#f1f5f9; font-size:14px; outline:none; }
.chat-input:focus { border-color:#6366f1; }
.send-btn { padding:11px 20px; background:#6366f1; border:none; border-radius:8px; color:#fff; font-size:14px; cursor:pointer; font-weight:600; }
.send-btn:hover { background:#4f46e5; }
.send-btn:disabled { opacity:.5; cursor:not-allowed; }
.typing { align-self:flex-start; color:#64748b; font-size:13px; font-style:italic; }

/* ── Quick Issues ── */
.quick-issues { display:flex; flex-wrap:wrap; gap:8px; padding:12px 16px; border-top:1px solid #334155; }
.quick-btn { padding:6px 12px; background:#0f172a; border:1px solid #334155; border-radius:20px; color:#94a3b8; font-size:12px; cursor:pointer; transition:all .2s; }
.quick-btn:hover { border-color:#6366f1; color:#6366f1; }

/* ── Tickets List ── */
.ticket-card { background:#1e293b; border:1px solid #334155; border-radius:10px; padding:16px; margin-bottom:12px; }
.ticket-card-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:8px; }
.ticket-id { font-size:13px; font-weight:700; color:#6366f1; }
.ticket-desc { font-size:13px; color:#cbd5e1; margin:6px 0; line-height:1.4; }
.ticket-meta { font-size:11px; color:#64748b; }
.badge-s { padding:3px 10px; border-radius:20px; font-size:11px; font-weight:600; }
.pri-s.Critical { background:#7f1d1d; color:#fca5a5; }
.pri-s.High     { background:#7c2d12; color:#fdba74; }
.pri-s.Medium   { background:#713f12; color:#fde047; }
.pri-s.Low      { background:#14532d; color:#86efac; }
.st-s.Open        { background:#1e3a5f; color:#93c5fd; }
.st-s.In-Progress { background:#3b1f6b; color:#c4b5fd; }
.st-s.Resolved    { background:#14532d; color:#86efac; }
.st-s.Closed      { background:#1f2937; color:#6b7280; }

/* Scrollbar */
::-webkit-scrollbar { width:5px; }
::-webkit-scrollbar-track { background:#0f172a; }
::-webkit-scrollbar-thumb { background:#334155; border-radius:3px; }

.empty-state { text-align:center; padding:40px; color:#475569; }
.empty-state .icon { font-size:40px; margin-bottom:12px; }
</style>
</head>
<body>

<!-- ══ LOGIN ═══════════════════════════════════════════════════════════════ -->
<div id="loginPage">
  <div class="login-box">
    <div class="logo">🛠️</div>
    <h1>WIOM IT Helpdesk</h1>
    <p>Apni Employee ID daalo — AI aapki madad karega!</p>
    <input type="text" id="empIdInput" placeholder="Employee ID (e.g. 1234567)" maxlength="10"/>
    <input type="text" id="empNameInput" placeholder="Aapka Naam"/>
    <button class="btn-primary" onclick="doLogin()">🚀 Start Helpdesk</button>
    <div class="err" id="loginErr">❌ Employee ID nahi mila. Sajan se contact karo.</div>
  </div>
</div>

<!-- ══ MAIN ════════════════════════════════════════════════════════════════ -->
<div id="mainPage">
  <div class="topbar">
    <div class="topbar-left">
      <h2>🛠️ WIOM IT Helpdesk</h2>
      <p id="empInfoBar">Loading...</p>
    </div>
    <button class="logout-btn" onclick="doLogout()">← Logout</button>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('chat',this)">💬 AI Help Chat</button>
    <button class="tab-btn" onclick="switchTab('tickets',this)">🎫 Mere Tickets</button>
  </div>

  <!-- ── CHAT TAB ── -->
  <div id="tab-chat">
    <div class="chat-wrap">
      <div class="chat-messages" id="chatMessages">
        <div class="msg system">🤖 WIOM IT Helpdesk AI — Ready to help!</div>
      </div>
      <div class="quick-issues" id="quickIssues">
        <span style="font-size:12px;color:#64748b;margin-right:4px;">Quick:</span>
        <button class="quick-btn" onclick="quickSend('Laptop slow hai')">💻 Laptop Slow</button>
        <button class="quick-btn" onclick="quickSend('WiFi nahi chal raha')">📶 WiFi Issue</button>
        <button class="quick-btn" onclick="quickSend('Outlook nahi khul raha')">📧 Outlook Issue</button>
        <button class="quick-btn" onclick="quickSend('Teams call drop ho raha hai')">📹 Teams Issue</button>
        <button class="quick-btn" onclick="quickSend('Password bhool gaya')">🔑 Password Reset</button>
        <button class="quick-btn" onclick="quickSend('Printer nahi chal raha')">🖨️ Printer</button>
        <button class="quick-btn" onclick="quickSend('Naya laptop chahiye')">🛒 New Laptop</button>
        <button class="quick-btn" onclick="quickSend('Blue screen aa raha hai')">💙 BSOD</button>
      </div>
      <div class="chat-input-wrap">
        <input class="chat-input" id="chatInput" placeholder="Apni problem likho... (Hindi/English dono chalega)" onkeypress="if(event.key==='Enter')sendMsg()"/>
        <button class="send-btn" id="sendBtn" onclick="sendMsg()">Send ➤</button>
      </div>
    </div>
  </div>

  <!-- ── TICKETS TAB ── -->
  <div id="tab-tickets" style="display:none;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
      <span style="font-size:13px;color:#64748b;" id="ticketCount"></span>
      <button onclick="loadMyTickets()" style="padding:6px 14px;background:transparent;border:1px solid #334155;border-radius:8px;color:#94a3b8;font-size:12px;cursor:pointer;">🔄 Refresh</button>
    </div>
    <div id="myTicketsList"><div class="empty-state"><div class="icon">⏳</div><p>Loading...</p></div></div>
  </div>
</div>

<script>
const API = 'https://web-production-ef6c1.up.railway.app';
let empData = {};
let chatHistory = [];
let myTickets = [];

// ── LOGIN ───────────────────────────────────────────────────────────────────
async function doLogin() {
  const empId = document.getElementById('empIdInput').value.trim().toUpperCase();
  const name  = document.getElementById('empNameInput').value.trim();
  if (!empId) { showErr('Employee ID daalo!'); return; }

  try {
    // Try to look up employee from API
    const res = await fetch(`${API}/api/employees/${empId}`).catch(()=>null);
    if (res && res.ok) {
      const data = await res.json();
      const emp  = data.employee || data;
      empData = { empId: emp.empId, name: emp.name || name, dept: emp.department, floor: emp.floor, email: emp.email, laptop: emp.laptop, laptopSN: emp.laptopSN };
    } else {
      // Allow manual entry if not found (guest mode)
      if (!name) { showErr('Naam bhi daalo!'); return; }
      empData = { empId, name, dept: 'Unknown', floor: '', email: '', laptop: '', laptopSN: '' };
    }

    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('mainPage').style.display  = 'block';
    document.getElementById('empInfoBar').textContent  =
      `${empData.name} | ${empData.dept||'WIOM'} | ${empData.floor||''} | ${empData.laptop ? 'Laptop: '+empData.laptop : ''}`;

    // Welcome message
    addBotMsg(`Namaste ${empData.name.split(' ')[0]} bhai/didi! 👋\n\nMain aapka IT Helpdesk assistant hoon. Koi bhi laptop, internet, software ya kisi bhi cheez ki problem batao — main try karunga pehle solve karne ki, zarurat hui toh Sajan Kumar ko ticket bhej dunga! 🛠️\n\nKya problem aa rahi hai?`);
  } catch(e) {
    showErr('Server se connect nahi ho paa raha. Thodi der baad try karo.');
  }
}

function showErr(msg) {
  const el = document.getElementById('loginErr');
  el.textContent = '❌ ' + msg;
  el.style.display = 'block';
}

function doLogout() {
  empData = {}; chatHistory = [];
  document.getElementById('chatMessages').innerHTML = '<div class="msg system">🤖 WIOM IT Helpdesk AI — Ready to help!</div>';
  document.getElementById('mainPage').style.display = 'none';
  document.getElementById('loginPage').style.display = 'flex';
  document.getElementById('loginErr').style.display = 'none';
}

// ── TABS ────────────────────────────────────────────────────────────────────
function switchTab(tab, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-chat').style.display    = tab === 'chat'    ? 'block' : 'none';
  document.getElementById('tab-tickets').style.display = tab === 'tickets' ? 'block' : 'none';
  if (tab === 'tickets') loadMyTickets();
}

// ── CHAT ────────────────────────────────────────────────────────────────────
function addBotMsg(text, ticketInfo) {
  const wrap = document.getElementById('chatMessages');
  const div  = document.createElement('div');
  div.className = 'msg bot';
  div.innerHTML = text.replace(/\n/g,'<br/>');
  if (ticketInfo) {
    div.innerHTML += `<div class="ticket-created">✅ <b>${ticketInfo.ticketId}</b> create ho gaya!<br/>Sajan Kumar jald contact karenge. Priority: <b>${ticketInfo.priority}</b></div>`;
  }
  wrap.appendChild(div);
  wrap.scrollTop = wrap.scrollHeight;
}

function addUserMsg(text) {
  const wrap = document.getElementById('chatMessages');
  const div  = document.createElement('div');
  div.className = 'msg user';
  div.textContent = text;
  wrap.appendChild(div);
  wrap.scrollTop = wrap.scrollHeight;
}

function addTyping() {
  const wrap = document.getElementById('chatMessages');
  const div  = document.createElement('div');
  div.className = 'msg typing'; div.id = 'typingIndicator';
  div.textContent = '🤖 Soch raha hoon...';
  wrap.appendChild(div);
  wrap.scrollTop = wrap.scrollHeight;
}

function removeTyping() {
  document.getElementById('typingIndicator')?.remove();
}

function quickSend(text) {
  document.getElementById('chatInput').value = text;
  sendMsg();
}

async function sendMsg() {
  const input = document.getElementById('chatInput');
  const text  = input.value.trim();
  if (!text) return;

  input.value = '';
  document.getElementById('sendBtn').disabled = true;
  addUserMsg(text);
  chatHistory.push({ role: 'user', content: text });
  addTyping();

  try {
    const res  = await fetch(`${API}/api/ai/chat`, {
      method : 'POST',
      headers: { 'Content-Type': 'application/json' },
      body   : JSON.stringify({
        messages: chatHistory,
        empId   : empData.empId,
        empName : empData.name,
        source  : 'web'
      })
    });
    const data = await res.json();
    removeTyping();

    const reply = data.reply || 'Kuch error aa gaya, dobara try karo.';
    chatHistory.push({ role: 'assistant', content: reply });

    let ticketInfo = null;
    if (data.shouldCreateTicket && data.ticketData) {
      // Create ticket automatically
      ticketInfo = await createTicket(data.ticketData, text);
      if (ticketInfo) myTickets.unshift(ticketInfo);
    }

    addBotMsg(reply, ticketInfo);
  } catch(e) {
    removeTyping();
    addBotMsg('❌ Server se connect nahi ho pa raha. Seedha Sajan se contact karo: 📞 9654244281');
  }

  document.getElementById('sendBtn').disabled = false;
  document.getElementById('chatInput').focus();
}

async function createTicket(ticketData, originalMsg) {
  try {
    const res = await fetch(`${API}/api/tickets`, {
      method : 'POST',
      headers: { 'Content-Type': 'application/json' },
      body   : JSON.stringify({
        empId      : empData.empId,
        empName    : empData.name,
        empEmail   : empData.email,
        empDept    : empData.dept,
        empFloor   : empData.floor,
        laptop     : empData.laptop,
        category   : ticketData.category   || 'Other',
        priority   : ticketData.priority   || 'Medium',
        description: ticketData.description|| originalMsg,
        source     : 'web',
        aiTried    : true,
        aiSteps    : ticketData.steps || []
      })
    });
    const data = await res.json();
    return data.ticket || null;
  } catch { return null; }
}

// ── MY TICKETS ──────────────────────────────────────────────────────────────
async function loadMyTickets() {
  const list = document.getElementById('myTicketsList');
  list.innerHTML = '<div class="empty-state"><div class="icon">⏳</div><p>Loading...</p></div>';
  try {
    const res  = await fetch(`${API}/api/tickets?empId=${empData.empId}&limit=50`);
    const data = await res.json();
    const tickets = (data.tickets || []).filter(t => t.empId === empData.empId);
    document.getElementById('ticketCount').textContent = `Aapke ${tickets.length} ticket(s)`;
    if (!tickets.length) {
      list.innerHTML = '<div class="empty-state"><div class="icon">🎉</div><p>Abhi koi ticket nahi! Sab theek chal raha hai.</p></div>';
      return;
    }
    list.innerHTML = tickets.map(t => {
      const statusClass = (t.status||'Open').replace(' ','-');
      const timeStr = timeAgo(t.createdAt);
      return `
      <div class="ticket-card">
        <div class="ticket-card-header">
          <span class="ticket-id">${t.ticketId}</span>
          <div style="display:flex;gap:6px;">
            <span class="badge-s pri-s ${t.priority}">${t.priority}</span>
            <span class="badge-s st-s ${statusClass}">${t.status}</span>
          </div>
        </div>
        <div class="ticket-desc">${t.description}</div>
        <div class="ticket-meta">
          📂 ${t.category||'Other'} &nbsp;|&nbsp; ⏱ ${timeStr}
          ${t.resolution ? `<br/>✅ <em>Resolution: ${t.resolution}</em>` : ''}
        </div>
      </div>`;
    }).join('');
  } catch(e) {
    list.innerHTML = '<div class="empty-state"><div class="icon">❌</div><p>Load failed. Refresh karo.</p></div>';
  }
}

function timeAgo(dateStr) {
  const diff = (Date.now() - new Date(dateStr)) / 1000;
  if (diff < 60)    return 'Abhi abhi';
  if (diff < 3600)  return Math.floor(diff/60) + ' min pehle';
  if (diff < 86400) return Math.floor(diff/3600) + ' ghante pehle';
  return Math.floor(diff/86400) + ' din pehle';
}

// Enter to login
document.getElementById('empNameInput').addEventListener('keypress', e => { if(e.key==='Enter') doLogin(); });
</script>
</body>
</html>
