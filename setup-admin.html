<!DOCTYPE html>
<html>
<head>
  <title>WIOM Helpdesk - Admin Setup</title>
  <style>
    body { font-family: Arial; background: #1a1a2e; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    .box { background: #16213e; padding: 40px; border-radius: 12px; width: 400px; text-align: center; }
    h2 { color: #e94560; margin-bottom: 10px; }
    p { color: #aaa; font-size: 14px; margin-bottom: 25px; }
    button { background: #e94560; color: white; border: none; padding: 14px 40px; border-radius: 8px; font-size: 16px; cursor: pointer; width: 100%; }
    button:hover { background: #c73652; }
    #result { margin-top: 20px; padding: 15px; border-radius: 8px; display: none; font-size: 14px; }
    .success { background: #1a472a; border: 1px solid #2ecc71; color: #2ecc71; }
    .error { background: #4a1a1a; border: 1px solid #e74c3c; color: #e74c3c; }
  </style>
</head>
<body>
  <div class="box">
    <h2>🛠️ WIOM IT Helpdesk</h2>
    <p>Admin account banane ke liye button click karo.<br>Sirf ek baar karna hai!</p>
    <button onclick="createAdmin()">Admin Account Banao</button>
    <div id="result"></div>
  </div>

  <script>
    async function createAdmin() {
      const btn = document.querySelector('button');
      btn.textContent = 'Creating...';
      btn.disabled = true;

      const resultDiv = document.getElementById('result');

      try {
        const res = await fetch('https://web-production-ef6c1.up.railway.app/api/auth/setup-admin', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: 'Wiom@2024' })
        });

        const data = await res.json();
        resultDiv.style.display = 'block';

        if (res.ok) {
          resultDiv.className = 'success';
          resultDiv.innerHTML = '✅ Admin created!<br><b>Username:</b> sajan<br><b>Password:</b> Wiom@2024<br><br>Screenshot le lo!';
        } else {
          resultDiv.className = res.status === 400 ? 'success' : 'error';
          resultDiv.innerHTML = (res.status === 400 ? '✅ Already exists! ' : '❌ ') + JSON.stringify(data);
        }
      } catch (err) {
        resultDiv.style.display = 'block';
        resultDiv.className = 'error';
        resultDiv.innerHTML = '❌ Error: ' + err.message;
      }

      btn.textContent = 'Admin Account Banao';
      btn.disabled = false;
    }
  </script>
</body>
</html>
